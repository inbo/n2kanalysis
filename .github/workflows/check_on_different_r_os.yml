on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

name: R-CMD-check-OS

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-22.04,   r: 'devel', rspm: "https://packagemanager.rstudio.com/cran/__linux__/jammy/latest"}
          - {os: ubuntu-22.04,   r: 'oldrel', rspm: "https://packagemanager.rstudio.com/cran/__linux__/jammy/latest"}

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      _R_CHECK_SYSTEM_CLOCK_: false
      RSPM: ${{ matrix.config.rspm }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      N2KBUCKET: ${{ secrets.N2KBUCKET }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          extra-repositories: https://inla.r-inla-download.org/R/stable

      - uses: r-lib/actions/setup-pandoc@v2

      - name: linux dependencies
        if: runner.os == 'linux'
        run: |
          cd /tmp
          wget http://ftp.gnu.org/gnu/glibc/glibc-2.38.tar.gz
          tar -xzf glibc-2.38.tar.gz
          mkdir glibc-build
          cd glibc-build
          ../glibc-2.38/configure --prefix=/usr/local/glibc-2.38
          make -j$(nproc)
          sudo make install
          ldd --version
      
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::347082780157:role/inbo-n2kmonitoring-shared-infra-eu-west-1-unittest-role
          aws-region: eu-west-1

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"error"'
